spring.application.name=api-gateway
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.routes[1].id=booking-service
spring.cloud.gateway.routes[1].uri=lb://booking-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/bookings/**

spring.cloud.gateway.routes[2].id=tour-service
spring.cloud.gateway.routes[2].uri=lb://tour-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/tours/**

spring.cloud.gateway.routes[3].id=accommodation-service
spring.cloud.gateway.routes[3].uri=lb://accommodation-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/reservations/**